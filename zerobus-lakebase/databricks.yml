# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "zerobus-lakebase"

include:
  - resources/*.yml
  - resources/*/*.yml


targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
      root_path: /Users/user@company.com/.bundle/${bundle.name}/${bundle.target}

variables:
  workspace_host:
    description: "The Databricks workspace host URL"
    default: https://example.databricks.com/
