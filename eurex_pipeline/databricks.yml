# This is a Databricks asset bundle definition for eurex_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: eurex_pipeline
  uuid: # uuid

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://workspace-id.8.gcp.databricks.com/
    variables:
      catalog: main
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://workspace-id.8.gcp.databricks.com/
      # We explicitly deploy to /Workspace/Users/tobi.wole@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/your.email@example.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: your.email@example.com
        level: CAN_MANAGE
