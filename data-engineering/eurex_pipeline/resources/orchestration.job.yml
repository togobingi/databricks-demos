resources:
  jobs:
    End_to_End_Workflow:
      name: End-to-End Workflow
      tasks:
        - task_key: Eurex_ETL_Pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.eurex_daily_stats_pipeline.id}

        - task_key: dbt-gold
          depends_on:
            - task_key: Eurex_ETL_Pipeline
          dbt_task:
            project_directory: ../eurex_dbt/
            commands:
              - dbt build
            warehouse_id: ${var.warehouse_id}
            catalog: ${var.catalog}
            schema: ${var.schema}
            source: WORKSPACE
          environment_key: dbt-default
        
      environments:
        - environment_key: dbt-default
          spec:
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
            environment_version: "5"
