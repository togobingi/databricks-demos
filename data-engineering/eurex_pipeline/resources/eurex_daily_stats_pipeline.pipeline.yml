resources:
  pipelines:
    eurex_daily_stats_pipeline:
      name: Eurex Daily Stats Pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}

      configuration:
        "bad_rows": "('Product Settle Type','--')"
        "catalog": ${var.catalog}
        "schema": ${var.schema}
        "volume": ${var.volume}

      libraries:
        - glob:
            include: ../src/transformations/**
        
      environment:
        dependencies:
          - xlrd>=2.0.1
      root_path: ../src
      serverless: true
