resources:
  pipelines:
    eurex_daily_stats_pipeline:
      name: Eurex Daily Stats Pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}

      configuration:
        "bad_rows": "('Product Settle Type','--')"
        "catalog": ${var.catalog}
        "schema": ${var.schema}
        "volume": ${var.volume}
        "user_name": ${var.user_name}

      libraries:
        - glob:
            include: ../src/transformations/**
      root_path: ../src
      serverless: true
