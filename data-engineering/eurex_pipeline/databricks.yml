# This is a Databricks asset bundle definition for eurex_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: eurex_pipeline
  uuid: # uuid

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  volume:
    description: Volume to use
  warehouse_id:
    lookup:
      warehouse: 'Serverless Starter Warehouse' # Add the name of the SQL warehouse you have access to in your Databricks workspace

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://WORKSPACE-ID.gcp.databricks.com/
    variables:
      catalog: main # update your caralog name
      schema: default # update your schema name
      volume: volume # update your volume name
  prod:
    mode: production
    workspace:
      host: https://WORKSPACE-ID.gcp.databricks.com/
      # We explicitly deploy to /Workspace/Users/tobi.wole@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/YOUR.EMAIL@example.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: YOUR.EMAIL@example.com
        level: CAN_MANAGE
