bundle:
  name: databricks_app

include:
  - resources/*.yml

variables:
  dbt_target_path:
    description: "Target path for dbt docs"
    default: "/databricks-apps/"
  dbt_project_directory:
    description: "DBT Project Directory"
    default: "[DBT-PROJECT-DIRECTORY]"
  schema:
    description: "Specify the schema for dbt models"
    default: "default"
  catalog:
    description: "Specify the Databricks catalog name"
    default: "main"
  
#workspace:
#  host: https://myworkspace.databricks.com

targets:
  dev:
    default: true
    mode: development