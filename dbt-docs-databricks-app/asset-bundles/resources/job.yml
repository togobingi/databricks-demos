resources:
  sql_warehouses:
      analytics_warehouse:
        name: "Serverless Starter Warehouse"
        cluster_size: "2X-Small"
        auto_stop_mins: 10
        enable_serverless_compute: true
  jobs:
    dbt_docs:
      name: dbt docs
      tasks:
        - task_key: dbt-run
          dbt_task:
            project_directory: ${var.dbt_project_directory}
            commands:
              - dbt deps
              - dbt seed --target-path  ${var.dbt_target_path}
              - dbt run --target-path  ${var.dbt_target_path}
              - dbt docs generate --target-path ${var.dbt_target_path}
            schema: ${var.schema}
            warehouse_id:  ${resources.sql_warehouses.analytics_warehouse.id}
            catalog: ${var.catalog}
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "3"
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
      performance_target: PERFORMANCE_OPTIMIZED

  apps:
    dbt_docs_apps:
      name: "dbt-docs-app"
      description: "The app which deploys the dbt docs application"

      # The location of the source code for the app.
      source_code_path:  ${var.dbt_target_path}

      # The resources which this app has access to.
      resources:
        - name: "app-job"
          description: "A job which deploys the ressources required for the app to work."
          job:
            id: ${resources.jobs.dbt_docs.id}
            permission: "CAN_MANAGE_RUN"